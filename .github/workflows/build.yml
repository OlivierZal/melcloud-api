concurrency:
  cancel-in-progress: true
  group: ci-${{ github.ref }}
jobs:
  lint:
    if: github.actor != 'dependabot[bot]'
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          cache: npm
          node-version: latest
      - run: npm ci --ignore-scripts
      - run: npm run lint
      - run: npm run format
  test:
    if: github.actor != 'dependabot[bot]'
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          cache: npm
          node-version: latest
      - run: npm ci --ignore-scripts
      - run: npm run build
      - run: npm test
  audit:
    if: github.actor != 'dependabot[bot]'
    name: Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          cache: npm
          node-version: latest
      - run: npm audit --omit=dev
name: Build package
on: [pull_request, push]
permissions:
  contents: read
