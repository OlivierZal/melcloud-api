concurrency:
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
  group: ci-${{ github.ref }}
jobs:
  check:
    name: Check
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-node-and-install
        with:
          node-version: lts/*
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format
      - run: npm run docs
      - run: npm run lint:package
    timeout-minutes: 15
  test:
    # `latest` tracks brand-new Node releases; continue-on-error keeps
    # the workflow run green when that leg breaks. The check run itself
    # still reports failure, so keep `Test (Node latest)` out of the
    # required status checks or it will still block merges.
    continue-on-error: ${{ matrix.node-version == 'latest' }}
    name: Test (Node ${{ matrix.node-version }})
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: ./.github/actions/setup-node-and-install
        with:
          node-version: ${{ matrix.node-version }}
      # Coverage (and the Sonar upload that consumes it) runs once, on
      # the Node 22 leg — the `engines` floor — so quality metrics track
      # the oldest supported runtime; other legs just run the suite.
      - if: matrix.node-version == 22
        run: npm test -- --coverage
      - if: matrix.node-version != 22
        run: npm test
      - if: matrix.node-version == 22 && (github.event_name == 'push' || (github.event.pull_request.user.login != 'dependabot[bot]' && github.event.pull_request.head.repo.full_name == github.repository))
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        node-version: [22, latest, lts/*]
    timeout-minutes: 20
name: CI
on:
  merge_group: {}
  pull_request: {}
  push:
    branches: [main]
permissions: {}
